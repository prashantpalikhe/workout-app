name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Prisma needs DATABASE_URL at generate time (postinstall), even though
  # it doesn't connect. Provide a dummy value for jobs without a real DB.
  DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @workout/shared build
      - run: pnpm --filter @workout/api test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: workout_app_test
          POSTGRES_USER: workout
          POSTGRES_PASSWORD: workout_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workout -d workout_app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @workout/shared build

      - name: Install Playwright browsers
        run: cd apps/web && pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter @workout/web test:e2e
        env:
          CI: true
          DATABASE_URL: postgresql://workout:workout_dev@localhost:5432/workout_app_test
          JWT_SECRET: e2e-test-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: e2e-test-refresh-secret-at-least-32-chars
          NUXT_API_PROXY_URL: http://localhost:3002/api
          RESEND_API_KEY: re_test_fake_key_for_ci
          MAIL_FROM: test@example.com
          FRONTEND_URL: http://localhost:3010

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
